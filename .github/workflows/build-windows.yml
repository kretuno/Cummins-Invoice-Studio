name: Build Windows Application

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "CumminsInvoiceStudio" --icon "assets/app_icon.ico" --add-data "assets;assets" --add-data "sample_data;sample_data" app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: CumminsInvoiceStudio-Windows
        path: dist/CumminsInvoiceStudio.exe
